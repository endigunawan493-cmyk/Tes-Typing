<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType Zenith - Time Attack</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --p2: #ff0055; --p3: #00ffa3; --bg: #050505; --card: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .main-container { width: 95%; max-width: 850px; background: var(--card); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        
        .menu-tabs { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #666; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-weight: 800; }
        .tab-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,242,255,0.1); }

        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .player-slot { background: rgba(0,0,0,0.5); padding: 12px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .status-dot.online { background: var(--p3); }

        .mode-container { display: inline-flex; gap: 5px; background: #000; padding: 5px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        .mode-btn { background: transparent; color: #555; border: none; padding: 8px 15px; cursor: pointer; font-weight: 600; border-radius: 7px; }
        .mode-btn.active { background: var(--neon); color: #000; }

        #game-area { display: none; }
        #race-track { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; display: none; }
        .lane { height: 35px; position: relative; border-bottom: 1px solid #222; display: flex; align-items: center; }
        .car { position: absolute; left: 0; transition: 0.4s; font-size: 20px; }
        .car-tag { position: absolute; top: -15px; font-size: 9px; color: var(--neon); font-weight: bold; }

        .word-wrapper { background: #000; padding: 20px; border-radius: 15px; height: 95px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        #word-section { display: flex; flex-wrap: wrap; gap: 0 15px; text-align: left; transition: 0.3s; }
        .word { font-size: 26px; line-height: 50px; color: #444; }
        .current-word { background: rgba(255,255,255,0.1); color: #fff; border-radius: 5px; padding: 0 5px; }
        .word.correct { color: var(--p3) !important; }
        .word.wrong-live { color: var(--p2) !important; text-decoration: underline; }

        input#word-input { width: 60%; padding: 15px; font-size: 20px; border-radius: 12px; border: 2px solid #222; background: #111; color: #fff; outline: none; }
        input#word-input.error { border-color: var(--p2); }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="winner-title">FINISH</h1>
        <div id="final-stats" style="margin: 20px 0; font-size: 20px;"></div>
        <button onclick="location.reload()" style="padding: 12px 30px; border-radius: 8px; border:none; background:var(--neon); font-weight:bold; cursor:pointer;">MAIN LAGI</button>
    </div>

    <div class="main-container">
        <div class="menu-tabs">
            <button class="tab-btn active" id="tab-solo" onclick="switchMode('solo')">SOLO PRACTICE</button>
            <button class="tab-btn" id="tab-race" onclick="switchMode('race')">MULTIPLAYER RACE</button>
        </div>

        <div id="panel-solo">
            <div class="mode-container">
                <button class="mode-btn active" id="s-easy" onclick="setSoloDiff('easy')">EASY</button>
                <button class="mode-btn" id="s-hard" onclick="setSoloDiff('hard')">HARD</button>
            </div>
            <p style="color:var(--neon); font-weight:800; font-size:14px;">MODE: 60 DETIK LATIHAN</p>
            <button onclick="startSolo()" style="background:var(--p3); border:none; padding:15px 50px; border-radius:10px; font-weight:900; cursor:pointer; margin-top:10px;">START PRACTICE</button>
        </div>

        <div id="panel-race" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3); padding:15px; border-radius:15px; margin-bottom:15px;">
                <div style="text-align:left"><small style="color:#666">ID:</small><br><b id="my-id-display" style="color:var(--neon)">...</b></div>
                <div>
                    <input type="text" id="join-id" placeholder="Host ID..." style="background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:8px; width:100px;">
                    <button onclick="joinRoom()" style="background:var(--neon); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">JOIN</button>
                </div>
            </div>
            <div class="mode-container" id="race-diff-selector">
                <button class="mode-btn active" id="r-easy" onclick="changeRaceDiff('easy')">EASY</button>
                <button class="mode-btn" id="r-hard" onclick="changeRaceDiff('hard')">HARD</button>
            </div>
            <div class="player-list" id="player-list"></div>
            <div id="host-controls" class="hidden">
                <button onclick="startRace()" style="background:var(--p3); width:100%; padding:15px; border:none; border-radius:12px; font-weight:900; cursor:pointer;">START RACE</button>
            </div>
            <p id="race-status" style="font-size:11px; color:#444">Menunggu Host...</p>
        </div>

        <div id="game-area">
            <div id="race-track"></div>
            <div class="word-wrapper">
                <div id="word-section"></div>
            </div>
            <div style="display:flex; align-items:center; gap:20px; justify-content:center;">
                <input type="text" id="word-input" placeholder="Type..." autocomplete="off">
                <div id="timer" style="font-size:30px; font-weight:800; color:var(--neon)">60.0s</div>
            </div>
        </div>
    </div>

    <script>
        const wordPool = {
            easy: ["ada", "aku", "bisa", "dari", "dia", "hari", "ini", "itu", "jika", "kita", "kamu", "makan", "nasi", "pagi", "satu", "saya", "tahu", "apa", "beli", "bawa", "bola", "buku", "coba", "dari", "esok", "film", "guru", "hati", "ikan", "jaga", "kaki", "lima", "meja", "nama", "obat", "padi", "paku", "rapi", "sana", "tali"],
            hard: ["adalah", "mereka", "sudah", "dengan", "dalam", "bahwa", "sangat", "karena", "mungkin", "kembali", "menjadi", "setelah", "namun", "ketika", "masalah", "seperti", "seorang", "sebuah", "tersebut", "terjadi", "melalui", "terhadap", "beberapa", "terutama", "berbagai", "sebagai", "mempunyai", "melakukan"]
        };

        let myID = "Player_" + Math.floor(Math.random()*999);
        document.getElementById('my-id-display').innerText = myID;

        let peer = new Peer(myID), connections = [], players = [myID], activeMode = 'solo', currentDiff = 'easy';
        let words = [], currentIdx = 0, timerOn = false, interval = null, timeLeft = 60;
        let stats = { correct: 0, total: 0, chars: 0 };

        function switchMode(m) {
            activeMode = m;
            document.getElementById('tab-solo').classList.toggle('active', m === 'solo');
            document.getElementById('tab-race').classList.toggle('active', m === 'race');
            document.getElementById('panel-solo').classList.toggle('hidden', m === 'race');
            document.getElementById('panel-race').classList.toggle('hidden', m === 'solo');
            document.getElementById('game-area').style.display = 'none';
        }

        // --- SOLO PRACTICE ENGINE ---
        function setSoloDiff(d) {
            currentDiff = d;
            document.getElementById('s-easy').classList.toggle('active', d === 'easy');
            document.getElementById('s-hard').classList.toggle('active', d === 'hard');
        }

        function startSolo() {
            activeMode = 'solo'; timeLeft = 60;
            words = [];
            const pool = wordPool[currentDiff];
            for(let i=0; i<300; i++) words.push(pool[Math.floor(Math.random()*pool.length)]); // Banyak biar gak habis
            
            document.getElementById('panel-solo').classList.add('hidden');
            document.getElementById('race-track').style.display = 'none';
            document.getElementById('timer').innerText = "60.0s";
            initGameUI();
        }

        // --- RACE ENGINE ---
        peer.on('connection', (conn) => {
            document.getElementById('host-controls').classList.remove('hidden');
            conn.on('open', () => {
                connections.push(conn);
                players.push(conn.peer);
                renderLobby();
                broadcast({ type: 'sync', players, diff: currentDiff });
            });
            conn.on('data', handleData);
        });

        function joinRoom() {
            const hostId = document.getElementById('join-id').value;
            const conn = peer.connect(hostId);
            conn.on('open', () => {
                connections = [conn];
                document.getElementById('race-diff-selector').style.pointerEvents = 'none';
                document.getElementById('race-status').innerText = "Connected! Waiting for Host...";
            });
            conn.on('data', handleData);
        }

        function handleData(data) {
            if(data.type === 'sync') { players = data.players; currentDiff = data.diff; renderLobby(); }
            if(data.type === 'start') { words = data.words; activeMode = 'race'; initGameUI(); }
            if(data.type === 'pos') {
                const car = document.getElementById(`car-${data.idx}`);
                if(car) car.style.left = data.val + "%";
                if(connections.length > 1) broadcast(data); 
            }
            if(data.type === 'win') showFinal(data.name, data.time, data.wpm, data.acc);
        }

        function broadcast(msg) { connections.forEach(c => c.send(msg)); }
        function renderLobby() {
            const list = document.getElementById('player-list');
            list.innerHTML = players.map(p => `<div class="player-slot active"><div class="status-dot online"></div><span>${p}</span></div>`).join('');
        }

        function changeRaceDiff(d) {
            currentDiff = d;
            document.getElementById('r-easy').classList.toggle('active', d === 'easy');
            document.getElementById('r-hard').classList.toggle('active', d === 'hard');
            broadcast({ type: 'sync', players, diff: d });
        }

        function startRace() {
            const raceWords = [];
            const pool = wordPool[currentDiff];
            for(let i=0; i<40; i++) raceWords.push(pool[Math.floor(Math.random()*pool.length)]);
            words = raceWords;
            broadcast({ type: 'start', words });
            initGameUI();
        }

        // --- COMMON CORE ---
        function initGameUI() {
            document.querySelector('.menu-tabs').classList.add('hidden');
            document.getElementById('panel-race').classList.add('hidden');
            document.getElementById('game-area').style.display = 'block';
            
            if(activeMode === 'race') {
                document.getElementById('race-track').style.display = 'block';
                document.getElementById('race-track').innerHTML = players.map((p, i) => `
                    <div class="lane"><div id="car-${i}" class="car" style="filter: hue-rotate(${i*90}deg)">
                    <span class="car-tag">${p}</span>🏎️</div></div>`).join('');
                document.getElementById('timer').innerText = "0.0s";
            }

            document.getElementById('word-section').innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            document.getElementById('w-0').classList.add('current-word');
            document.getElementById('word-input').value = "";
            document.getElementById('word-input').focus();
            currentIdx = 0; timerOn = false; stats = { correct: 0, total: 0, chars: 0 };
        }

        document.getElementById('word-input').addEventListener('input', (e) => {
            const val = e.target.value;
            const target = words[currentIdx];
            const el = document.getElementById(`w-${currentIdx}`);

            if(!timerOn && val.length > 0) {
                timerOn = true;
                if(activeMode === 'solo') {
                    let startTime = Date.now();
                    interval = setInterval(() => {
                        timeLeft = (60 - (Date.now() - startTime)/1000).toFixed(1);
                        document.getElementById('timer').innerText = timeLeft + "s";
                        if(timeLeft <= 0) {
                            clearInterval(interval);
                            const wpm = Math.round((stats.chars / 5));
                            const acc = Math.round((stats.correct/stats.total)*100) || 0;
                            showFinal(myID, "60s", wpm, acc);
                        }
                    }, 100);
                } else {
                    let startT = Date.now();
                    interval = setInterval(() => {
                        document.getElementById('timer').innerText = ((Date.now()-startT)/1000).toFixed(1) + "s";
                    }, 100);
                }
            }

            if(val.trim() !== target.substring(0, val.trim().length)) {
                e.target.classList.add('error'); el.classList.add('wrong-live');
            } else {
                e.target.classList.remove('error'); el.classList.remove('wrong-live');
            }

            if(val.endsWith(' ')) {
                if(val.trim() === target) {
                    el.classList.replace('current-word', 'correct');
                    stats.correct++; stats.chars += target.length; stats.total++;
                    currentIdx++;
                    
                    if(activeMode === 'race') {
                        const progress = (currentIdx / words.length) * 95;
                        const myIdx = players.indexOf(myID);
                        document.getElementById(`car-${myIdx}`).style.left = progress + "%";
                        const msg = { type: 'pos', idx: myIdx, val: progress };
                        if(connections.length > 0) connections.forEach(c => c.send(msg));
                        
                        if(currentIdx >= words.length) {
                            const t = document.getElementById('timer').innerText;
                            const wpm = Math.round((stats.chars / 5) / (parseFloat(t)/60));
                            const acc = Math.round((stats.correct/stats.total)*100);
                            const winMsg = { type: 'win', name: myID, time: t, wpm, acc };
                            if(connections.length > 0) connections.forEach(c => c.send(winMsg));
                            showFinal(myID, t, wpm, acc);
                        }
                    }

                    const next = document.getElementById(`w-${currentIdx}`);
                    if(next) {
                        next.classList.add('current-word');
                        if(next.offsetTop > el.offsetTop) {
                            const curY = parseInt(document.getElementById('word-section').style.transform.replace(/[^0-9-]/g, '')) || 0;
                            document.getElementById('word-section').style.transform = `translateY(${curY - 50}px)`;
                        }
                    }
                    e.target.value = '';
                } else { e.target.value = val.trim(); }
            }
        });

        function showFinal(name, time, wpm, acc) {
            clearInterval(interval);
            document.getElementById('word-input').disabled = true;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('winner-title').innerText = activeMode === 'solo' ? "TIME UP!" : (name === myID ? "🏆 JUARA 1!" : "FINISH!");
            document.getElementById('final-stats').innerHTML = `Kecepatan: <b style="color:var(--neon)">${wpm} WPM</b><br>Akurasi: ${acc}%<br>Waktu: ${time}`;
        }
    </script>
</body>
</html>
