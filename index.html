<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType - Race to Finish</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --p2: #ff0055;
            --correct: #00ffa3;
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-container {
            width: 90%;
            max-width: 850px;
            background: var(--card);
            backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Multiplayer UI */
        .multiplayer-ui {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            font-size: 13px;
        }
        #my-id-display { color: var(--neon); font-weight: bold; cursor: pointer; }

        /* Race Track with Finish Line */
        .race-track {
            margin-bottom: 25px;
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 95%, rgba(0, 242, 255, 0.2) 100%);
            padding: 20px;
            border-radius: 12px;
            position: relative;
            border: 1px solid var(--border);
        }
        .lane { height: 40px; position: relative; border-bottom: 1px solid #222; margin-bottom: 5px; }
        .car { position: absolute; left: 0; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-size: 24px; white-space: nowrap; z-index: 2; }
        .finish-line { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 30px; 
            background: repeating-conic-gradient(#fff 0% 25%, #000 0% 50%) 50% / 10px 10px;
            opacity: 0.3; border-radius: 0 12px 12px 0;
        }

        /* Word Box */
        .word-wrapper {
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 16px;
            height: 95px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 25px;
        }
        #word-section {
            display: flex; flex-wrap: wrap; gap: 0 15px; text-align: left;
            transition: transform 0.3s ease;
        }
        .word { font-size: 28px; line-height: 48px; color: #444; padding: 0 5px; }
        .current-word { background: rgba(255,255,255,0.1); color: #fff; border-radius: 5px; }
        .word.correct { color: var(--correct) !important; }
        .word.wrong { background: var(--p2) !important; color: #fff !important; border-radius: 5px; }

        /* Controls */
        .input-group { display: flex; gap: 15px; justify-content: center; align-items: center; }
        #word-input {
            width: 60%; padding: 18px; font-size: 22px; border-radius: 14px;
            border: 2px solid #222; background: #000; color: #fff; outline: none;
        }
        #word-input:focus { border-color: var(--neon); }
        #timer { font-size: 32px; font-weight: 800; color: var(--neon); min-width: 100px; }

        .hidden { display: none; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="winner-text" style="font-size: 50px; color: var(--neon);">YOU WIN!</h1>
        <p id="final-stats" style="font-size: 20px; opacity: 0.7;"></p>
        <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 10px; cursor:pointer; font-weight:bold; margin-top:20px;">MAIN LAGI</button>
    </div>

    <div class="main-container">
        <div class="multiplayer-ui">
            ID: <span id="my-id-display">Connecting...</span> | 
            <input type="text" id="conn-id" placeholder="ID Lawan..." style="background:#000; color:#fff; border:1px solid #333; padding:5px; border-radius:4px; width:120px;">
            <button onclick="connectToPeer()" style="background:var(--neon); border:none; padding:5px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">JOIN RACE</button>
        </div>

        <div class="race-track">
            <div class="finish-line"></div>
            <div class="lane"><div id="p1-car" class="car">🏎️ YOU</div></div>
            <div class="lane"><div id="p2-car" class="car" style="filter: hue-rotate(280deg)">🏎️ OPPONENT</div></div>
        </div>

        <div class="word-wrapper">
            <div id="word-section"></div>
        </div>
        
        <div class="input-group">
            <input type="text" id="word-input" placeholder="Ketik di sini untuk mulai..." autocomplete="off">
            <div id="timer">00.0s</div>
        </div>
        <p style="margin-top: 15px; opacity: 0.5;">Target: <span id="target-count">50</span> Kata</p>
    </div>

    <script>
        const wordList = ["yang", "ada", "dan", "itu", "dari", "di", "ini", "untuk", "dengan", "saya", "adalah", "ke", "tidak", "bisa", "akan", "dalam", "kita", "kamu", "mereka", "sudah", "juga", "pada", "ia", "orang", "oleh", "sebagai", "sebuah", "atau", "dia", "kami", "telah", "bahwa", "hal", "sangat", "karena", "maka", "saat", "dapat", "lebih", "secara", "begitu", "hanya", "jika", "harus", "kembali", "banyak", "seperti", "hari", "anda", "ingin"];
        
        const targetWords = 50;
        let words = [];
        let currentIdx = 0;
        let startTime = null;
        let timerInterval = null;
        let peer = new Peer();
        let conn = null;

        const input = document.getElementById('word-input');
        const timerDisplay = document.getElementById('timer');
        const wordSection = document.getElementById('word-section');

        // Setup PeerJS
        peer.on('open', (id) => document.getElementById('my-id-display').innerText = id);
        peer.on('connection', (c) => { conn = c; initMultiplayer(); });

        function connectToPeer() {
            conn = peer.connect(document.getElementById('conn-id').value);
            initMultiplayer();
        }

        function initMultiplayer() {
            conn.on('data', (data) => {
                if(data.type === 'pos') {
                    document.getElementById('p2-car').style.left = data.val + "%";
                }
                if(data.type === 'finish') showEnd(false, data.time);
            });
            alert("Terhubung! Balapan akan dimulai saat kamu mengetik.");
        }

        function initGame() {
            words = [];
            for(let i=0; i<targetWords; i++) words.push(wordList[Math.floor(Math.random()*wordList.length)]);
            wordSection.innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            document.getElementById('w-0').classList.add('current-word');
            document.getElementById('target-count').innerText = targetWords;
        }

        input.addEventListener('input', () => {
            if(!startTime) {
                startTime = Date.now();
                timerInterval = setInterval(() => {
                    const diff = (Date.now() - startTime) / 1000;
                    timerDisplay.innerText = diff.toFixed(1) + "s";
                }, 100);
            }

            if(input.value.endsWith(' ')) {
                const typed = input.value.trim();
                const target = words[currentIdx];
                const el = document.getElementById(`w-${currentIdx}`);

                if(typed === target) {
                    el.classList.add('correct');
                } else {
                    el.classList.add('wrong');
                }

                el.classList.remove('current-word');
                currentIdx++;

                // Progress
                const progress = (currentIdx / targetWords) * 95; // 95% agar tidak keluar layar
                document.getElementById('p1-car').style.left = progress + "%";
                if(conn) conn.send({ type: 'pos', val: progress });

                if(currentIdx >= targetWords) {
                    const finalTime = timerDisplay.innerText;
                    if(conn) conn.send({ type: 'finish', time: finalTime });
                    showEnd(true, finalTime);
                } else {
                    const nextEl = document.getElementById(`w-${currentIdx}`);
                    nextEl.classList.add('current-word');
                    // Scroll
                    if(nextEl.offsetTop > el.offsetTop) {
                        const currentY = parseInt(wordSection.style.transform.replace(/[^0-9-]/g, '')) || 0;
                        wordSection.style.transform = `translateY(${currentY - 48}px)`;
                    }
                }
                input.value = '';
            }
        });

        function showEnd(isWinner, time) {
            clearInterval(timerInterval);
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('winner-text').innerText = isWinner ? "YOU WIN! 🏆" : "YOU LOSE! 🏁";
            document.getElementById('winner-text').style.color = isWinner ? "var(--correct)" : "var(--p2)";
            document.getElementById('final-stats').innerText = `Waktu: ${time} | Target: ${targetWords} Kata`;
        }

        initGame();
    </script>
</body>
</html>
