<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType Zenith - Room & Difficulty</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --p2: #ff0055; --p3: #00ffa3; --p4: #ffcc00; --bg: #050505; --card: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .main-container { width: 95%; max-width: 850px; background: var(--card); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        
        /* Lobby UI */
        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .player-slot { background: rgba(0,0,0,0.5); padding: 12px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .player-slot.active { border-color: var(--neon); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .status-dot.online { background: var(--p3); box-shadow: 0 0 5px var(--p3); }

        /* Mode Selector (Easy/Hard) */
        .mode-container { display: inline-flex; gap: 5px; background: #000; padding: 5px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        .mode-btn { background: transparent; color: #555; border: none; padding: 8px 20px; cursor: pointer; font-weight: 600; border-radius: 7px; transition: 0.3s; }
        .mode-btn.active { background: var(--neon); color: #000; }

        /* Game Area */
        #game-area { display: none; }
        #race-track { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        .lane { height: 35px; position: relative; border-bottom: 1px solid #222; display: flex; align-items: center; }
        .car { position: absolute; left: 0; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); font-size: 20px; }
        .car-tag { position: absolute; top: -15px; font-size: 9px; color: var(--neon); font-weight: bold; white-space: nowrap; }

        /* Typing System */
        .word-wrapper { background: #000; padding: 20px; border-radius: 15px; height: 95px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        #word-section { display: flex; flex-wrap: wrap; gap: 0 15px; text-align: left; transition: 0.3s; }
        .word { font-size: 26px; line-height: 50px; color: #444; }
        .current-word { background: rgba(255,255,255,0.1); color: #fff; border-radius: 5px; padding: 0 5px; }
        .word.correct { color: var(--p3) !important; }
        .word.wrong-live { color: var(--p2) !important; text-decoration: underline; }

        input#word-input { width: 60%; padding: 15px; font-size: 20px; border-radius: 12px; border: 2px solid #222; background: #111; color: #fff; outline: none; }
        input#word-input.error { border-color: var(--p2); }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="winner-title" style="font-size: 40px;">RACE OVER</h1>
        <div id="final-stats" style="margin: 20px 0; font-size: 20px; line-height: 1.6;"></div>
        <button onclick="location.reload()" style="padding: 12px 30px; border-radius: 8px; border:none; background:var(--neon); font-weight:bold; cursor:pointer;">MAIN LAGI</button>
    </div>

    <div class="main-container">
        <div id="room-lobby">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="text-align:left">
                    <span style="font-size:10px; color:#666; display:block">MY PERMANENT ID</span>
                    <b id="my-id-display" style="color:var(--neon); font-size:18px;">...</b>
                </div>
                <div>
                    <input type="text" id="join-id" placeholder="Host ID..." style="background:#000; border:1px solid #333; color:#fff; padding:8px; border-radius:8px;">
                    <button onclick="joinRoom()" style="background:var(--neon); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">JOIN</button>
                </div>
            </div>

            <div class="mode-container" id="difficulty-selector">
                <button class="mode-btn active" id="btn-easy" onclick="changeDifficulty('easy')">EASY</button>
                <button class="mode-btn" id="btn-hard" onclick="changeDifficulty('hard')">HARD</button>
            </div>

            <div class="player-list" id="player-list"></div>
            
            <div id="host-controls" style="display:none; margin-top:20px;">
                <button onclick="startRace()" style="background:var(--p3); width:100%; padding:15px; border:none; border-radius:12px; font-weight:900; cursor:pointer; font-size:16px;">START RACE</button>
            </div>
            <div id="guest-waiting" style="display:none; color:#666; font-size:13px;">Menunggu Host memulai balapan...</div>
        </div>

        <div id="game-area">
            <div id="race-track"></div>
            <div class="word-wrapper">
                <div id="word-section"></div>
            </div>
            <div style="display:flex; align-items:center; gap:20px; justify-content:center;">
                <input type="text" id="word-input" placeholder="Ketik di sini..." autocomplete="off">
                <div id="timer" style="font-size:30px; font-weight:800; color:var(--neon)">0.0s</div>
            </div>
        </div>
    </div>

    <script>
        const wordLists = {
            easy: ["ada", "aku", "bisa", "dari", "dia", "hari", "ini", "itu", "jika", "kita", "kamu", "makan", "nasi", "pagi", "satu", "saya", "tahu", "apa", "beli", "bawa"],
            hard: ["adalah", "mereka", "sudah", "dengan", "dalam", "bahwa", "sangat", "karena", "mungkin", "kembali", "menjadi", "setelah", "namun", "ketika", "masalah"]
        };

        let myID = localStorage.getItem('cybertype_id') || "User_" + Math.floor(Math.random()*999);
        localStorage.setItem('cybertype_id', myID);
        document.getElementById('my-id-display').innerText = myID;

        let peer = new Peer(myID), connections = [], players = [myID], role = 'solo', currentDifficulty = 'easy';
        let words = [], currentIdx = 0, timerOn = false, interval = null, startTime = 0;
        let stats = { correct: 0, total: 0, chars: 0 };

        peer.on('open', () => renderLobby());

        peer.on('connection', (conn) => {
            if(players.length >= 4) return conn.close();
            role = 'host';
            document.getElementById('host-controls').style.display = 'block';
            conn.on('open', () => {
                connections.push(conn);
                players.push(conn.peer);
                renderLobby();
                broadcast({ type: 'sync', players, diff: currentDifficulty });
            });
            conn.on('data', handleData);
        });

        function joinRoom() {
            const hostId = document.getElementById('join-id').value;
            if(!hostId) return;
            role = 'guest';
            document.getElementById('difficulty-selector').style.pointerEvents = 'none'; // Guest can't change
            const conn = peer.connect(hostId);
            conn.on('open', () => {
                connections = [conn];
                document.getElementById('guest-waiting').style.display = 'block';
                renderLobby();
            });
            conn.on('data', handleData);
        }

        function handleData(data) {
            if(data.type === 'sync') {
                players = data.players;
                currentDifficulty = data.diff;
                updateDifficultyUI();
                renderLobby();
            }
            if(data.type === 'start') {
                words = data.words;
                initGameUI();
            }
            if(data.type === 'pos') {
                const car = document.getElementById(`car-${data.idx}`);
                if(car) car.style.left = data.val + "%";
                if(role === 'host') broadcast(data); 
            }
            if(data.type === 'win') showFinal(data.name, data.time, data.wpm, data.acc);
        }

        function changeDifficulty(m) {
            if(role === 'guest') return;
            currentDifficulty = m;
            updateDifficultyUI();
            if(role === 'host') broadcast({ type: 'sync', players, diff: currentDifficulty });
        }

        function updateDifficultyUI() {
            document.getElementById('btn-easy').classList.toggle('active', currentDifficulty === 'easy');
            document.getElementById('btn-hard').classList.toggle('active', currentDifficulty === 'hard');
        }

        function broadcast(msg) { connections.forEach(c => c.send(msg)); }

        function renderLobby() {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            for(let i=0; i<4; i++) {
                const p = players[i];
                list.innerHTML += `
                    <div class="player-slot ${p ? 'active' : ''}">
                        <div class="status-dot ${p ? 'online' : ''}"></div>
                        <span>${p || 'Menunggu...'}</span>
                        ${p === myID ? '<small>(Kamu)</small>' : ''}
                    </div>`;
            }
        }

        function startRace() {
            const gameWords = [];
            const pool = wordLists[currentDifficulty];
            for(let i=0; i<40; i++) gameWords.push(pool[Math.floor(Math.random()*pool.length)]);
            words = gameWords;
            broadcast({ type: 'start', words });
            initGameUI();
        }

        function initGameUI() {
            document.getElementById('room-lobby').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            const track = document.getElementById('race-track');
            track.innerHTML = players.map((p, i) => `
                <div class="lane">
                    <div id="car-${i}" class="car" style="filter: hue-rotate(${i*90}deg)">
                        <span class="car-tag">${p}</span>🏎️
                    </div>
                </div>`).join('');
            
            document.getElementById('word-section').innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            document.getElementById('w-0').classList.add('current-word');
            document.getElementById('word-input').focus();
        }

        document.getElementById('word-input').addEventListener('input', (e) => {
            const val = e.target.value;
            const target = words[currentIdx];
            const el = document.getElementById(`w-${currentIdx}`);

            if(!timerOn && val.length > 0) {
                timerOn = true; startTime = Date.now();
                interval = setInterval(() => {
                    document.getElementById('timer').innerText = ((Date.now()-startTime)/1000).toFixed(1) + "s";
                }, 100);
            }

            if(val.trim() !== target.substring(0, val.trim().length)) {
                e.target.classList.add('error'); el.classList.add('wrong-live');
            } else {
                e.target.classList.remove('error'); el.classList.remove('wrong-live');
            }

            if(val.endsWith(' ')) {
                if(val.trim() === target) {
                    el.classList.replace('current-word', 'correct');
                    stats.correct++; stats.chars += target.length; stats.total++;
                    currentIdx++;
                    
                    const progress = (currentIdx / words.length) * 95;
                    const myIdx = players.indexOf(myID);
                    document.getElementById(`car-${myIdx}`).style.left = progress + "%";
                    
                    const msg = { type: 'pos', idx: myIdx, val: progress };
                    if(role === 'host') broadcast(msg); else connections[0].send(msg);

                    if(currentIdx >= words.length) {
                        const t = document.getElementById('timer').innerText;
                        const wpm = Math.round(stats.chars / 5);
                        const acc = Math.round((stats.correct/stats.total)*100);
                        const winMsg = { type: 'win', name: myID, time: t, wpm, acc };
                        if(role === 'host') broadcast(winMsg); else connections[0].send(winMsg);
                        showFinal(myID, t, wpm, acc);
                    }

                    const next = document.getElementById(`w-${currentIdx}`);
                    if(next) {
                        next.classList.add('current-word');
                        if(next.offsetTop > el.offsetTop) {
                            const curY = parseInt(document.getElementById('word-section').style.transform.replace(/[^0-9-]/g, '')) || 0;
                            document.getElementById('word-section').style.transform = `translateY(${curY - 50}px)`;
                        }
                    }
                    e.target.value = '';
                } else { e.target.value = val.trim(); }
            }
        });

        function showFinal(name, time, wpm, acc) {
            clearInterval(interval);
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('winner-title').innerText = name === myID ? "🏆 YOU WIN!" : "🏁 RACE FINISHED";
            document.getElementById('winner-title').style.color = name === myID ? "var(--p3)" : "var(--p2)";
            document.getElementById('final-stats').innerHTML = `
                Winner: <b style="color:var(--neon)">${name}</b><br>
                Time: ${time}<br>
                Speed: ${wpm} WPM | Acc: ${acc}%
            `;
        }
    </script>
</body>
</html>
