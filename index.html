<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType Zenith - Room System v2</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --p2: #ff0055; --p3: #00ffa3; --bg: #050505; --card: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .main-container { width: 95%; max-width: 800px; background: var(--card); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        
        .menu-tabs { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #666; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 800; }
        .tab-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,242,255,0.1); }

        /* PROGRESS BARS */
        #race-progress { margin-bottom: 20px; display: none; text-align: left; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; }
        .p-bar-wrapper { margin-bottom: 8px; }
        .p-name { font-size: 10px; color: #888; margin-bottom: 3px; }
        .p-bar { height: 6px; background: #222; border-radius: 10px; overflow: hidden; position: relative; }
        .p-fill { height: 100%; width: 0%; background: var(--neon); transition: 0.3s; box-shadow: 0 0 10px var(--neon); }

        .word-wrapper { background: #000; padding: 20px; border-radius: 15px; height: 95px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; }
        #word-section { display: flex; flex-wrap: wrap; gap: 0 15px; text-align: left; transition: 0.3s; }
        .word { font-size: 26px; line-height: 50px; color: #333; }
        .current-word { background: rgba(255,255,255,0.1); color: #fff; border-radius: 5px; padding: 0 5px; }
        .word.correct { color: var(--p3) !important; }
        .word.wrong-live { color: var(--p2) !important; text-decoration: underline; }

        input#word-input { width: 50%; padding: 15px; font-size: 20px; border-radius: 12px; border: 2px solid #222; background: #111; color: #fff; outline: none; }
        input#word-input.error { border-color: var(--p2); }

        .btn-main { background: var(--p3); border: none; padding: 15px 40px; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="res-title">FINISH</h1>
        <div id="res-stats" style="margin: 20px 0; font-size: 20px; text-align: center;"></div>
        <button onclick="location.reload()" class="btn-main">KEMBALI KE MENU</button>
    </div>

    <div class="main-container">
        <div class="menu-tabs" id="main-tabs">
            <button class="tab-btn active" id="tab-solo" onclick="switchMode('solo')">SOLO PRACTICE</button>
            <button class="tab-btn" id="tab-race" onclick="switchMode('race')">ROOM MULTIPLAYER</button>
        </div>

        <div id="panel-solo">
            <h2 style="color: var(--p3);">60 DETIK PRACTICE</h2>
            <button onclick="startSolo()" class="btn-main">START</button>
        </div>

        <div id="panel-race" class="hidden">
            <div style="background:rgba(0,0,0,0.3); padding:20px; border-radius:15px; border:1px solid var(--border);">
                <p style="margin:0; color:#555; font-size:11px;">ID ROOM KAMU (Bisa diedit):</p>
                <input type="text" id="my-room-id-input" style="background:transparent; border:none; border-bottom:1px solid var(--neon); color:var(--neon); font-size:24px; text-align:center; width:200px; margin:10px 0; font-family:monospace;">
                <br>
                <button onclick="initPeer()" id="btn-lock" class="btn-outline" style="font-size:10px; padding:5px 10px;">KUNCI ID ROOM</button>
                
                <div style="margin-top:25px; border-top:1px solid #222; padding-top:20px;">
                    <input type="text" id="join-room-input" placeholder="Masukkan ID Room Lawan..." style="background:#000; border:1px solid #333; color:#fff; padding:12px; border-radius:10px; width:200px;">
                    <button onclick="joinRoom()" class="btn-main" style="padding:12px 25px;">MASUK</button>
                </div>
            </div>
            
            <div id="lobby-info" class="hidden" style="margin-top:20px;">
                <div id="player-tags" style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;"></div>
                <button id="btn-start-race" onclick="startRace()" class="btn-main" style="width:100%; background:var(--neon)">START BALAPAN</button>
            </div>
            <p id="conn-status" style="font-size:11px; color:#444; margin-top:10px;">ID Room belum dikunci.</p>
        </div>

        <div id="game-area" class="hidden">
            <div id="race-progress"></div>
            <div class="word-wrapper"><div id="word-section"></div></div>
            <div style="display:flex; align-items:center; gap:20px; justify-content:center;">
                <input type="text" id="word-input" placeholder="Ketik..." autocomplete="off">
                <div id="timer" style="font-size:30px; font-weight:800; color:var(--neon)">60.0s</div>
                <button id="btn-reset" onclick="startSolo()" class="btn-outline">ULANGI</button>
            </div>
        </div>
    </div>

    <script>
        const wordList = ["ada", "aku", "bisa", "dari", "dia", "hari", "ini", "itu", "jika", "kita", "makan", "nasi", "pagi", "satu", "saya", "tahu", "apa", "beli", "bawa", "buku", "coba", "paku", "rapi", "sana", "tali"];
        
        let myRoomID = "ROOM-" + Math.floor(1000 + Math.random() * 8999);
        document.getElementById('my-room-id-input').value = myRoomID;

        let peer, connections = [], players = [], activeMode = 'solo';
        let words = [], currentIdx = 0, timerOn = false, interval = null;
        let stats = { correct: 0, total: 0, chars: 0 };

        function initPeer() {
            myRoomID = document.getElementById('my-room-id-input').value;
            peer = new Peer(myRoomID);
            document.getElementById('btn-lock').innerText = "ID TERKUNCI";
            document.getElementById('btn-lock').disabled = true;
            document.getElementById('my-room-id-input').disabled = true;

            peer.on('open', (id) => {
                document.getElementById('conn-status').innerText = "Online. Menunggu lawan...";
                players = [id];
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    connections.push(conn);
                    document.getElementById('lobby-info').classList.remove('hidden');
                    // Tambah player manual karena PeerJS ga ada list room
                    if(!players.includes(conn.peer)) players.push(conn.peer);
                    updateLobbyUI();
                });
                conn.on('data', handleData);
            });
        }

        function switchMode(m) {
            activeMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+m).classList.add('active');
            document.getElementById('panel-solo').classList.toggle('hidden', m === 'race');
            document.getElementById('panel-race').classList.toggle('hidden', m === 'solo');
        }

        function joinRoom() {
            const id = document.getElementById('join-room-input').value;
            if(!id || !peer) return alert("Kunci ID kamu dulu!");
            const conn = peer.connect(id);
            conn.on('open', () => {
                connections = [conn];
                players = [myRoomID, id];
                document.getElementById('conn-status').innerText = "Terhubung ke " + id;
                document.getElementById('lobby-info').classList.remove('hidden');
                document.getElementById('btn-start-race').classList.add('hidden');
            });
            conn.on('data', handleData);
        }

        function handleData(data) {
            if(data.type === 'start') { words = data.words; activeMode = 'race'; players = data.players; initUI(); }
            if(data.type === 'progress') {
                const fill = document.getElementById('fill-' + data.id);
                if(fill) fill.style.width = data.percent + "%";
            }
            if(data.type === 'win') finish(data.id);
        }

        function updateLobbyUI() {
            document.getElementById('player-tags').innerHTML = players.map(p => `<span style="background:var(--neon); color:#000; padding:5px 10px; border-radius:5px; font-size:10px; font-weight:bold;">${p}</span>`).join('');
        }

        function startSolo() {
            activeMode = 'solo'; words = [];
            for(let i=0; i<300; i++) words.push(wordList[Math.floor(Math.random()*wordList.length)]);
            initUI();
        }

        function startRace() {
            const raceWords = [];
            for(let i=0; i<40; i++) raceWords.push(wordList[Math.floor(Math.random()*wordList.length)]);
            connections.forEach(c => c.send({ type: 'start', words: raceWords, players: players }));
            words = raceWords;
            activeMode = 'race';
            initUI();
        }

        function initUI() {
            document.getElementById('main-tabs').classList.add('hidden');
            document.getElementById('panel-solo').classList.add('hidden');
            document.getElementById('panel-race').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            
            if(activeMode === 'race') {
                document.getElementById('btn-reset').classList.add('hidden');
                document.getElementById('race-progress').style.display = 'block';
                document.getElementById('race-progress').innerHTML = players.map(p => `
                    <div class="p-bar-wrapper">
                        <div class="p-name">${p} ${p === myRoomID ? '(Anda)' : ''}</div>
                        <div class="p-bar"><div class="p-fill" id="fill-${p}"></div></div>
                    </div>
                `).join('');
            }

            document.getElementById('word-section').innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            document.getElementById('w-0').classList.add('current-word');
            document.getElementById('word-input').value = "";
            document.getElementById('word-input').disabled = false;
            document.getElementById('word-input').focus();
            currentIdx = 0; timerOn = false; stats = { correct: 0, total: 0, chars: 0 };
            document.getElementById('timer').innerText = activeMode === 'solo' ? "60.0s" : "0.0s";
            document.getElementById('word-section').style.transform = "translateY(0px)";
        }

        document.getElementById('word-input').addEventListener('input', (e) => {
            const val = e.target.value;
            const target = words[currentIdx];
            if(!timerOn && val.length > 0) {
                timerOn = true;
                let start = Date.now();
                interval = setInterval(() => {
                    if(activeMode === 'solo') {
                        let diff = (60 - (Date.now() - start)/1000).toFixed(1);
                        document.getElementById('timer').innerText = diff + "s";
                        if(diff <= 0) finish(myRoomID);
                    } else {
                        document.getElementById('timer').innerText = ((Date.now() - start)/1000).toFixed(1) + "s";
                    }
                }, 100);
            }

            const el = document.getElementById(`w-${currentIdx}`);
            if(val.trim() !== target.substring(0, val.trim().length)) {
                e.target.classList.add('error'); el.classList.add('wrong-live');
            } else {
                e.target.classList.remove('error'); el.classList.remove('wrong-live');
            }

            if(val.endsWith(' ')) {
                if(val.trim() === target) {
                    el.classList.replace('current-word', 'correct');
                    stats.correct++; stats.chars += target.length; stats.total++;
                    currentIdx++;
                    
                    if(activeMode === 'race') {
                        const percent = (currentIdx / words.length) * 100;
                        document.getElementById('fill-' + myRoomID).style.width = percent + "%";
                        connections.forEach(c => c.send({ type: 'progress', id: myRoomID, percent }));
                        if(currentIdx >= words.length) {
                            connections.forEach(c => c.send({ type: 'win', id: myRoomID }));
                            finish(myRoomID);
                        }
                    }

                    const next = document.getElementById(`w-${currentIdx}`);
                    if(next) {
                        next.classList.add('current-word');
                        if(next.offsetTop > el.offsetTop) {
                            const curY = parseInt(document.getElementById('word-section').style.transform.replace(/[^0-9-]/g, '')) || 0;
                            document.getElementById('word-section').style.transform = `translateY(${curY - 50}px)`;
                        }
                    }
                    e.target.value = '';
                }
            }
        });

        function finish(winner) {
            clearInterval(interval);
            const t = document.getElementById('timer').innerText;
            const wpm = Math.round((stats.chars / 5) / (activeMode === 'solo' ? 1 : parseFloat(t)/60));
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('res-title').innerText = winner === myRoomID ? "KAMU MENANG!" : "PEMENANG: " + winner;
            document.getElementById('res-stats').innerHTML = `Kecepatan: ${wpm} WPM<br>Akurasi: ${Math.round((stats.correct/stats.total)*100)}%<br>Waktu: ${t}`;
        }
    </script>
</body>
</html>
