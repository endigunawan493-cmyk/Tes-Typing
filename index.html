<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyType - Fixed Scroll</title>
    <style>
        :root {
            --neon: #00f2ff;
            --dark: #0a0a0c;
            --card: #141417;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-container {
            width: 90%;
            max-width: 750px;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        .title {
            font-size: 2rem;
            letter-spacing: 5px;
            margin-bottom: 25px;
            color: white;
            text-transform: uppercase;
        }

        .title span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* KOTAK KATA FIXED SCROLL */
        .word-box {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 12px;
            font-size: 32px;
            line-height: 1.6;
            height: 105px; /* Tinggi disesuaikan untuk 2 baris teks */
            overflow: hidden; /* Sembunyikan scrollbar manual */
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 12px;
            border: 2px solid #222;
            scroll-behavior: smooth;
        }

        .word { 
            padding: 2px 10px; 
            border-radius: 6px; 
            color: #555;
            display: inline-block;
        }

        .current-word { 
            background: rgba(0, 242, 255, 0.15); 
            color: white; 
            border-bottom: 4px solid var(--neon); 
        }

        .correct { color: #00ffcc !important; }
        .wrong { color: #ff0055 !important; text-decoration: line-through; }

        .input-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        #word-input {
            width: 65%;
            padding: 18px;
            font-size: 22px;
            background: #000;
            border: 2px solid #333;
            color: white;
            border-radius: 12px;
            outline: none;
        }

        #word-input:focus { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        #timer { font-size: 35px; font-weight: bold; color: var(--neon); width: 80px; font-family: monospace; }

        #reset-btn {
            background: #222;
            color: white;
            border: none;
            padding: 15px 22px;
            cursor: pointer;
            border-radius: 12px;
            font-size: 24px;
        }

        #reset-btn:hover { background: var(--neon); color: black; }

        #result-board { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .result-grid { display: flex; justify-content: center; gap: 50px; }
        .value { font-size: 45px; font-weight: bold; color: var(--neon); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="title">EASY<span>TYPE</span></h1>
        
        <div class="word-box" id="word-section"></div>
        
        <div class="input-section">
            <input type="text" id="word-input" placeholder="Ketik..." autocomplete="off">
            <div id="timer">60</div>
            <button id="reset-btn">↻</button>
        </div>

        <div id="result-board" class="hidden">
            <div class="result-grid">
                <div class="res-item">
                    <span style="color:#888">WPM</span><br>
                    <span id="res-wpm" class="value">0</span>
                </div>
                <div class="res-item">
                    <span style="color:#888">AKURASI</span><br>
                    <span id="res-acc" class="value">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordList = ["ada", "aku", "bisa", "buku", "bola", "cara", "dari", "dua", "dia", "es", "foto", "guru", "hari", "ini", "itu", "ibu", "jika", "kita", "kamu", "kaki", "lari", "luar", "makan", "mana", "nama", "nasi", "pagi", "papa", "rapi", "satu", "saya", "tiga", "tahu", "api", "tamu", "sana", "sini"];

            let words = [];
            let currentWordIndex = 0;
            let timeLeft = 60;
            let timerStarted = false;
            let interval = null;
            let stats = { correct: 0, wrong: 0, totalChars: 0 };

            const wordSection = document.getElementById('word-section');
            const wordInput = document.getElementById('word-input');
            const timerDisplay = document.getElementById('timer');
            const resultBoard = document.getElementById('result-board');
            const resetBtn = document.getElementById('reset-btn');

            function initGame() {
                words = [];
                for(let i=0; i<200; i++) {
                    words.push(wordList[Math.floor(Math.random() * wordList.length)]);
                }
                
                wordSection.innerHTML = words.map((w, i) => `<span class="word" id="word-${i}">${w}</span>`).join('');
                wordSection.scrollTop = 0; 
                
                document.getElementById('word-0').classList.add('current-word');

                currentWordIndex = 0;
                timeLeft = 60;
                timerStarted = false;
                stats = { correct: 0, wrong: 0, totalChars: 0 };
                
                clearInterval(interval);
                wordInput.value = '';
                wordInput.disabled = false;
                wordInput.focus();
                timerDisplay.innerText = timeLeft;
                resultBoard.classList.add('hidden');
            }

            wordInput.addEventListener('input', () => {
                if (!timerStarted && wordInput.value.length > 0) {
                    timerStarted = true;
                    interval = setInterval(() => {
                        timeLeft--;
                        timerDisplay.innerText = timeLeft;
                        if (timeLeft === 0) endGame();
                    }, 1000);
                }
                
                if (wordInput.value.endsWith(' ')) {
                    const typedWord = wordInput.value.trim();
                    const targetWord = words[currentWordIndex];
                    const wordEl = document.getElementById(`word-${currentWordIndex}`);

                    if (typedWord === targetWord) {
                        wordEl.classList.add('correct');
                        stats.correct++;
                        stats.totalChars += targetWord.length;
                    } else {
                        wordEl.classList.add('wrong');
                        stats.wrong++;
                    }

                    wordEl.classList.remove('current-word');
                    currentWordIndex++;
                    
                    const next = document.getElementById(`word-${currentWordIndex}`);
                    if (next) {
                        next.classList.add('current-word');
                        
                        // FIX SCROLL: Menggunakan scrollIntoView agar kata selalu di tengah/atas
                        // Ini akan memastikan baris otomatis bergeser jika kata mulai tidak terlihat
                        next.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    wordInput.value = ''; 
                }
            });

            function endGame() {
                clearInterval(interval);
                wordInput.disabled = true;
                const wpm = Math.round((stats.totalChars / 5));
                const total = stats.correct + stats.wrong;
                const acc = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
                document.getElementById('res-wpm').innerText = wpm;
                document.getElementById('res-acc').innerText = acc + "%";
                resultBoard.classList.remove('hidden');
            }

            resetBtn.addEventListener('click', initGame);
            initGame();
        });
    </script>
</body>
</html>
