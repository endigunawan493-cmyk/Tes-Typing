<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType - 10FastFingers Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1 class="title">CYBER<span>TYPE</span></h1>
        
        <div class="word-box" id="word-section">
            <span class="loading">Inisialisasi sistem...</span>
        </div>
        
        <div class="input-section">
            <input type="text" id="word-input" placeholder="Ketik di sini..." autocomplete="off">
            <div id="timer">60</div>
            <button id="reset-btn">↻</button>
        </div>

        <div id="result-board" class="hidden">
            <div class="result-grid">
                <div class="res-item">
                    <span class="label">WPM</span>
                    <span id="res-wpm" class="value">0</span>
                </div>
                <div class="res-item">
                    <span class="label">Akurasi</span>
                    <span id="res-acc" class="value">0%</span>
                </div>
            </div>
            <div class="detail-stats">
                <p>Benar: <span id="res-correct" style="color:#00ffcc">0</span></p>
                <p>Salah: <span id="res-wrong" style="color:#ff0055">0</span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
