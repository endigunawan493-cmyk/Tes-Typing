<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Speed Typer - 10FastFingers Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="word-box" id="word-section">
            </div>
        
        <div class="input-section">
            <input type="text" id="word-input" autocomplete="off" autofocus>
            <div id="timer">60</div>
            <button id="reset-btn">↻</button>
        </div>

        <div id="result-board" class="hidden">
            <h2>Hasil Tes</h2>
            <p>Kecepatan: <span id="res-wpm">0</span> WPM</p>
            <p>Akurasi: <span id="res-acc">0</span>%</p>
            <p>Kata Benar: <span id="res-correct" style="color:#00ffcc">0</span></p>
            <p>Kata Salah: <span id="res-wrong" style="color:#ff0055">0</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
