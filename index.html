<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CyberType - P2P Race</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --p2: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; text-align: center; margin: 0; }
        
        .setup-zone { background: #111; padding: 20px; border-bottom: 1px solid #333; }
        .race-track { width: 85%; margin: 40px auto; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .lane { height: 50px; position: relative; border-bottom: 1px solid #333; display: flex; align-items: center; }
        
        .car { 
            position: absolute; left: 0; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            font-size: 24px; filter: drop-shadow(0 0 10px var(--color)); white-space: nowrap;
        }

        .typing-area { max-width: 700px; margin: 30px auto; background: #141417; padding: 40px; border-radius: 20px; border: 1px solid #333; }
        #words { font-size: 28px; color: #444; margin-bottom: 25px; line-height: 1.6; }
        .current { color: #fff; background: rgba(0, 242, 255, 0.1); border-radius: 5px; padding: 0 10px; border-bottom: 3px solid var(--neon); }
        
        input { width: 80%; padding: 15px; font-size: 22px; border-radius: 12px; border: 2px solid #333; background: #000; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        input:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn { background: var(--neon); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #my-id-display { color: var(--neon); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="setup-zone">
        <div id="step-1">
            ID Kamu: <span id="my-id-display">Generating...</span> 
            <small>(Klik untuk copy & kirim ke teman)</small>
        </div>
        <div id="step-2" style="margin-top: 10px;">
            <input type="text" id="conn-id" placeholder="Masukkan ID Teman..." style="width: 200px; padding: 5px; font-size: 14px;">
            <button class="btn" onclick="connectToPeer()">JOIN RACE</button>
        </div>
    </div>

    <div class="race-track">
        <div class="lane"><div id="p1-car" class="car" style="--color: var(--neon)">🏎️ YOU (0%)</div></div>
        <div class="lane"><div id="p2-car" class="car" style="--color: var(--p2)">🏎️ OPPONENT (0%)</div></div>
    </div>

    <div class="typing-area">
        <div id="words">Hubungkan dengan teman untuk balapan...</div>
        <input type="text" id="input" placeholder="Ketik di sini..." disabled autocomplete="off">
        <h2 id="status">OFFLINE</h2>
    </div>

    <script>
        const wordList = ["kita", "balapan", "online", "tanpa", "vps", "siapa", "paling", "cepat", "dia", "menang", "fokus", "pada", "layar", "sendiri", "jari", "kilat", "lincah", "tangan", "hebat"];
        let words = [];
        let currentIdx = 0;
        let peer = new Peer();
        let conn = null;

        // Mendapatkan ID sendiri
        peer.on('open', (id) => {
            document.getElementById('my-id-display').innerText = id;
            document.getElementById('my-id-display').onclick = () => {
                navigator.clipboard.writeText(id);
                alert("ID dicopy! Kirim ke temanmu.");
            };
        });

        // Menunggu koneksi masuk (Pemain 1 didatangi Pemain 2)
        peer.on('connection', (connection) => {
            conn = connection;
            setupChat();
            startGame();
        });

        // Menghubungi teman (Pemain 2 mendatangi Pemain 1)
        function connectToPeer() {
            const peerId = document.getElementById('conn-id').value;
            conn = peer.connect(peerId);
            setupChat();
            startGame();
        }

        function setupChat() {
            conn.on('open', () => {
                document.getElementById('status').innerText = "CONNECTED - STARTING!";
                document.getElementById('status').style.color = "#00ffa3";
            });

            // Menerima data posisi lawan
            conn.on('data', (data) => {
                if(data.type === 'progress') {
                    document.getElementById('p2-car').style.left = data.val + "%";
                    document.getElementById('p2-car').innerText = `🏎️ OPPONENT (${Math.round(data.val)}%)`;
                }
                if(data.type === 'win') {
                    alert("Lawanmu Menang! Coba lagi.");
                    location.reload();
                }
            });
        }

        function startGame() {
            words = [...wordList].sort(() => Math.random() - 0.5); // Acak kata agar sama
            document.getElementById('input').disabled = false;
            document.getElementById('input').focus();
            renderWords();
        }

        function renderWords() {
            const display = document.getElementById('words');
            display.innerHTML = words.map((w, i) => `<span id="w-${i}" class="${i===currentIdx?'current':''}">${w}</span>`).join(' ');
        }

        document.getElementById('input').addEventListener('input', (e) => {
            if (e.target.value.endsWith(' ')) {
                const typed = e.target.value.trim();
                if (typed === words[currentIdx]) {
                    currentIdx++;
                    let progress = (currentIdx / words.length) * 100;
                    
                    // Update tampilan lokal
                    document.getElementById('p1-car').style.left = progress + "%";
                    document.getElementById('p1-car').innerText = `🏎️ YOU (${Math.round(progress)}%)`;

                    // Kirim ke lawan
                    conn.send({ type: 'progress', val: progress });

                    if (currentIdx >= words.length) {
                        conn.send({ type: 'win' });
                        alert("SELAMAT! Kamu Menang!");
                        location.reload();
                    } else {
                        renderWords();
                    }
                }
                e.target.value = '';
            }
        });
    </script>
</body>
</html>
