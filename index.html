<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType - 10FF Edition</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --p2: #ff0055; --p3: #00ffa3; --bg: #f5f5f5; --card: #ffffff; --border: #dddddd; }
        body { background: var(--bg); color: #333; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .main-container { width: 95%; max-width: 900px; background: var(--card); padding: 30px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        
        /* 10FF STYLE WORD BOX */
        .word-box { 
            background: #fff; border: 1px solid var(--border); border-radius: 4px; 
            padding: 15px; margin-bottom: 15px; height: 100px; overflow: hidden;
            position: relative; line-height: 45px; text-align: left;
        }
        #word-section { display: flex; flex-wrap: wrap; gap: 0 10px; transition: transform 0.2s; }
        .word { font-size: 24px; color: #444; padding: 0 5px; border-radius: 3px; }
        
        /* Highlight Colors */
        .current-word { background: #ddd; color: #000; }
        .correct { color: #2ecc71 !important; }
        .wrong { background: #e74c3c !important; color: #fff !important; }
        .wrong-live { color: #e74c3c !important; }

        /* INPUT AREA */
        .control-panel { display: flex; gap: 10px; justify-content: center; background: #e9ecef; padding: 20px; border-radius: 4px; }
        input#word-input { width: 60%; padding: 12px; font-size: 20px; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        #timer { background: #337ab7; color: #fff; padding: 10px 20px; border-radius: 4px; font-weight: 800; font-size: 20px; min-width: 80px; }
        .btn-reload { background: #337ab7; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; }

        /* MULTIPLAYER PROGRESS */
        #race-progress { margin-bottom: 20px; display: none; text-align: left; }
        .p-bar-wrapper { margin-bottom: 8px; }
        .p-name { font-size: 10px; color: #777; margin-bottom: 2px; }
        .p-bar { height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
        .p-fill { height: 100%; width: 0%; background: #337ab7; transition: 0.3s linear; }

        .hidden { display: none; }
        #status-bar { font-size: 12px; color: #888; margin-top: 10px; }
        .tab-btn { padding: 8px 20px; border: 1px solid #ccc; background: #fff; cursor: pointer; margin: 0 5px 20px; }
        .tab-btn.active { background: #337ab7; color: #fff; border-color: #337ab7; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="menu-tabs">
            <button class="tab-btn active" id="tab-solo" onclick="switchMode('solo')">Solo Test</button>
            <button class="tab-btn" id="tab-race" onclick="switchMode('race')">Multiplayer (Max 4)</button>
        </div>

        <div id="panel-race" class="hidden" style="margin-bottom:20px; padding:15px; border:1px dashed #ccc;">
            <input type="text" id="my-id" placeholder="ID Kamu" style="padding:8px; width:150px;">
            <button onclick="initPeer()" id="btn-lock">Kunci ID</button>
            <span style="margin: 0 15px;">|</span>
            <input type="text" id="join-id" placeholder="ID Teman" style="padding:8px; width:150px;">
            <button onclick="joinRoom()">Join</button>
            <div id="lobby-info" class="hidden" style="margin-top:10px;">
                Pemain: <span id="p-count">1</span>/4 <button id="btn-start" onclick="startRace()" class="hidden">MULAI BALAPAN</button>
            </div>
        </div>

        <div id="race-progress"></div>

        <div class="word-box">
            <div id="word-section"></div>
        </div>

        <div class="control-panel">
            <input type="text" id="word-input" autocomplete="off" autofocus>
            <div id="timer">1:00</div>
            <button class="btn-reload" onclick="location.reload()">↻</button>
        </div>

        <div id="status-bar">Status: Menunggu...</div>
    </div>

    <script>
        const wordList = ["dan", "ia", "itu", "yang", "untuk", "pada", "ke", "para", "dengan", "saya", "kita", "kamu", "mereka", "adalah", "bisa", "tidak", "ada", "sudah", "akan", "dalam", "saat", "juga", "hanya", "dari", "dia", "lagi", "pernah", "ketika", "semua", "banyak", "orang", "baru", "hari", "maka", "tapi", "secara"];
        
        let peer, connections = [], players = [], activeMode = 'solo';
        let words = [], currentIdx = 0, timerOn = false, interval = null, scrollY = 0;
        let stats = { correct: 0, wrong: 0, chars: 0 };

        function switchMode(m) {
            activeMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+m).classList.add('active');
            document.getElementById('panel-race').classList.toggle('hidden', m === 'solo');
            initUI();
        }

        // PEER LOGIC
        function initPeer() {
            const id = document.getElementById('my-id').value.toUpperCase().trim();
            if(!id) return alert("Isi ID!");
            peer = new Peer(id, { secure: true });
            peer.on('open', (id) => {
                document.getElementById('status-bar').innerText = "ONLINE: " + id;
                document.getElementById('btn-lock').disabled = true;
                players = [id];
            });
            peer.on('connection', (conn) => {
                if(players.length >= 4) return;
                conn.on('open', () => {
                    connections.push(conn);
                    players.push(conn.peer);
                    document.getElementById('lobby-info').classList.remove('hidden');
                    document.getElementById('btn-start').classList.remove('hidden');
                    updateLobby();
                    connections.forEach(c => c.send({ type: 'sync', players }));
                });
                conn.on('data', handleData);
            });
        }

        function joinRoom() {
            const tid = document.getElementById('join-id').value.toUpperCase().trim();
            const conn = peer.connect(tid);
            conn.on('open', () => {
                connections = [conn];
                document.getElementById('lobby-info').classList.remove('hidden');
            });
            conn.on('data', handleData);
        }

        function handleData(data) {
            if(data.type === 'sync') { players = data.players; updateLobby(); }
            if(data.type === 'start') { words = data.words; players = data.players; activeMode = 'race'; initUI(); }
            if(data.type === 'prog') {
                const f = document.getElementById('fill-' + data.id);
                if(f) f.style.width = data.percent + "%";
            }
        }

        function updateLobby() { document.getElementById('p-count').innerText = players.length; }

        // GAME LOGIC
        function initUI() {
            words = [];
            const count = activeMode === 'solo' ? 300 : 40;
            for(let i=0; i<count; i++) words.push(wordList[Math.floor(Math.random()*wordList.length)]);
            
            document.getElementById('word-section').innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            document.getElementById('w-0').classList.add('current-word');
            document.getElementById('word-input').value = "";
            document.getElementById('word-input').disabled = false;
            document.getElementById('word-input').focus();
            
            if(activeMode === 'race') {
                document.getElementById('race-progress').style.display = 'block';
                document.getElementById('race-progress').innerHTML = players.map(p => `
                    <div class="p-bar-wrapper">
                        <div class="p-name">${p}</div>
                        <div class="p-bar"><div class="p-fill" id="fill-${p}"></div></div>
                    </div>
                `).join('');
            }

            currentIdx = 0; timerOn = false; scrollY = 0;
            stats = { correct: 0, wrong: 0, chars: 0 };
            document.getElementById('word-section').style.transform = "translateY(0px)";
            document.getElementById('timer').innerText = "1:00";
            if(interval) clearInterval(interval);
        }

        function startRace() {
            const rw = [];
            for(let i=0; i<45; i++) rw.push(wordList[Math.floor(Math.random()*wordList.length)]);
            connections.forEach(c => c.send({ type: 'start', words: rw, players }));
            words = rw; initUI();
        }

        document.getElementById('word-input').addEventListener('input', (e) => {
            if(!timerOn) {
                timerOn = true;
                let sec = 60;
                interval = setInterval(() => {
                    sec--;
                    let m = Math.floor(sec/60);
                    let s = sec%60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                    if(sec <= 0) finish();
                }, 1000);
            }

            const val = e.target.value.trim();
            const target = words[currentIdx];
            const el = document.getElementById(`w-${currentIdx}`);

            // Live checking (warna merah saat mengetik salah)
            if(val !== target.substring(0, val.length)) {
                el.classList.add('wrong-live');
            } else {
                el.classList.remove('wrong-live');
            }

            // Saat spasi ditekan
            if(e.target.value.endsWith(' ')) {
                if(val === target) {
                    el.className = 'word correct';
                    stats.correct++;
                    stats.chars += target.length;
                } else {
                    el.className = 'word wrong';
                    stats.wrong++;
                }

                if(activeMode === 'race') {
                    const p = (currentIdx / words.length) * 100;
                    connections.forEach(c => c.send({ type: 'prog', id: peer.id, percent: p }));
                    document.getElementById('fill-'+peer.id).style.width = p + "%";
                }

                currentIdx++;
                const next = document.getElementById(`w-${currentIdx}`);
                if(next) {
                    next.classList.add('current-word');
                    // Scroll logic: Jika kata selanjutnya turun baris
                    if(next.offsetTop > el.offsetTop + 10) {
                        scrollY -= 45;
                        document.getElementById('word-section').style.transform = `translateY(${scrollY}px)`;
                    }
                }
                e.target.value = "";
            }
        });

        function finish() {
            clearInterval(interval);
            document.getElementById('word-input').disabled = true;
            const wpm = Math.round(stats.chars / 5);
            alert(`Selesai!\nKecepatan: ${wpm} WPM\nBenar: ${stats.correct}\nSalah: ${stats.wrong}`);
        }

        // Init UI pertama kali
        initUI();
    </script>
</body>
</html>
