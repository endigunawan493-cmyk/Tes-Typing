<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType Zenith - 4 Player Race</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --p2: #ff0055; --p3: #00ffa3; --p4: #ffcc00; --bg: #050505; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .main-container { width: 95%; max-width: 900px; background: var(--card); backdrop-filter: blur(20px); padding: 30px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }

        /* Multi-Lane Race Track */
        #race-track { display: none; margin-bottom: 25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .lane { height: 40px; position: relative; border-bottom: 1px solid #222; display: flex; align-items: center; }
        .car { position: absolute; left: 0; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-size: 20px; white-space: nowrap; z-index: 5; }
        .car-label { font-size: 10px; position: absolute; top: -12px; opacity: 0.7; }

        /* UI Elements */
        .header-meta { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .user-pill { background: rgba(0,242,255,0.1); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--neon); color: var(--neon); font-weight: 800; cursor:pointer; }
        .lobby-status { font-size: 12px; color: #888; margin-top: 10px; }

        .word-wrapper { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 16px; height: 95px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 25px; }
        #word-section { display: flex; flex-wrap: wrap; gap: 0 15px; text-align: left; transition: transform 0.3s ease; }
        .word { font-size: 28px; line-height: 48px; color: #444; }
        .current-word { background: rgba(255,255,255,0.1); color: #fff; border-radius: 5px; padding: 0 5px; }
        .word.correct { color: var(--p3) !important; }
        .word.wrong-live { color: var(--p2) !important; text-decoration: underline; }

        #word-input { width: 60%; padding: 15px; font-size: 20px; border-radius: 12px; border: 2px solid #222; background: #000; color: #fff; outline: none; }
        #word-input.error { border-color: var(--p2); }
        #timer { font-size: 30px; font-weight: 800; color: var(--neon); min-width: 100px; }
        
        .hidden { display: none; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        
        /* Player Colors */
        .p1 { color: var(--neon); } .p2 { color: var(--p2); } .p3 { color: var(--p3); } .p4 { color: var(--p4); }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="res-title" style="font-size: 50px;">RACE END!</h1>
        <div id="leaderboard" style="text-align: left; margin: 20px 0; font-size: 24px;"></div>
        <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 10px; cursor:pointer; font-weight:bold; border:none; background:var(--neon);">BACK TO LOBBY</button>
    </div>

    <div class="main-container">
        <div class="header-meta">
            <div class="user-pill" onclick="changeID()">ID: <span id="my-id">...</span></div>
            <div id="connection-controls">
                <input type="text" id="host-id-input" placeholder="ID Host..." style="background:#000; color:#fff; border:1px solid #333; padding:8px; border-radius:8px; width:150px;">
                <button onclick="joinRace()" style="background:var(--neon); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">JOIN RACE</button>
            </div>
        </div>

        <div id="lobby-info" class="lobby-status">Menunggu pemain... (Solo Mode Aktif)</div>

        <div id="race-track">
            <div class="lane"><div id="car-0" class="car"><span class="car-label p1">P1</span>🏎️</div></div>
            <div class="lane"><div id="car-1" class="car" style="filter: hue-rotate(280deg)"><span class="car-label p2">P2</span>🏎️</div></div>
            <div class="lane"><div id="car-2" class="car" style="filter: hue-rotate(150deg)"><span class="car-label p3">P3</span>🏎️</div></div>
            <div class="lane"><div id="car-3" class="car" style="filter: hue-rotate(50deg)"><span class="car-label p4">P4</span>🏎️</div></div>
        </div>

        <div class="mode-container" id="solo-modes">
            <button class="mode-btn active" onclick="setMode('easy')">EASY</button>
            <button class="mode-btn" onclick="setMode('hard')">HARD</button>
        </div>

        <div class="word-wrapper">
            <div id="word-section"></div>
        </div>
        
        <div class="input-group" style="display:flex; justify-content:center; align-items:center; gap:20px;">
            <input type="text" id="word-input" placeholder="Ketik di sini..." autocomplete="off">
            <div id="timer">0.0s</div>
        </div>
        <div id="start-ctrl" style="margin-top:20px; display:none;">
            <button onclick="startMultiplayerRace()" style="background:var(--p3); border:none; padding:10px 30px; border-radius:8px; font-weight:900; cursor:pointer; color:#000;">START RACE (HOST ONLY)</button>
        </div>
    </div>

    <script>
        const lists = {
            easy: ["ada", "aku", "bisa", "dari", "dia", "hari", "ini", "itu", "kita", "kamu", "makan", "nasi", "pagi", "satu", "saya", "tahu", "apa", "beli"],
            hard: ["adalah", "mereka", "sudah", "dengan", "dalam", "bahwa", "sangat", "karena", "mungkin", "kembali", "menjadi", "setelah", "namun", "ketika"]
        };

        let myID = localStorage.getItem('cybertype_id') || "User_" + Math.floor(Math.random()*999);
        localStorage.setItem('cybertype_id', myID);
        document.getElementById('my-id').innerText = myID;

        let peer = new Peer(myID), connections = [], participants = [myID], myRole = 'solo';
        let words = [], currentIdx = 0, timerActive = false, interval = null, startTime = 0;
        let raceFinished = false;

        // --- Network Logic ---
        peer.on('connection', (conn) => {
            if (connections.length >= 3) return conn.close(); // Max 4 players
            myRole = 'host';
            setupConnection(conn);
            document.getElementById('start-ctrl').style.display = 'block';
            document.getElementById('lobby-info').innerText = `Pemain Terkoneksi: ${connections.length + 1}/4`;
        });

        function joinRace() {
            const hostId = document.getElementById('host-id-input').value;
            if (!hostId) return alert("Masukkan ID Host!");
            const conn = peer.connect(hostId);
            myRole = 'guest';
            setupConnection(conn);
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                if (myRole === 'host') {
                    connections.push(conn);
                    participants.push(conn.peer);
                    broadcast({ type: 'lobby', users: participants });
                }
                document.getElementById('race-track').style.display = 'block';
                document.getElementById('solo-modes').style.display = 'none';
            });

            conn.on('data', (data) => {
                if (data.type === 'lobby') {
                    participants = data.users;
                    document.getElementById('lobby-info').innerText = `Menunggu Host memulai... (${participants.length}/4 Pemain)`;
                }
                if (data.type === 'start') {
                    initGame(data.seed);
                }
                if (data.type === 'update') {
                    document.getElementById(`car-${data.pIdx}`).style.left = data.pos + "%";
                }
                if (data.type === 'end') {
                    showFinal(data.rankings);
                }
            });
        }

        function broadcast(data) {
            connections.forEach(c => c.send(data));
        }

        // --- Game Logic ---
        function setMode(m) { /* Tetap sama seperti sebelumnya */ }

        function initGame(seed = null) {
            words = [];
            const count = (myRole !== 'solo') ? 40 : 100;
            const pool = lists.easy; 
            // Sederhana: gunakan seed atau random
            for(let i=0; i<count; i++) words.push(pool[Math.floor(Math.random() * pool.length)]);
            
            document.getElementById('word-section').innerHTML = words.map((w, i) => `<span class="word" id="w-${i}">${w}</span>`).join('');
            document.getElementById('word-section').style.transform = "translateY(0px)";
            document.getElementById('w-0').classList.add('current-word');
            
            currentIdx = 0; timerActive = false; raceFinished = false;
            clearInterval(interval);
            document.getElementById('word-input').value = '';
            document.getElementById('word-input').disabled = false;
            document.getElementById('race-track').style.display = (myRole !== 'solo') ? 'block' : 'none';
        }

        function startMultiplayerRace() {
            const seed = Math.random();
            broadcast({ type: 'start', seed: seed });
            initGame(seed);
        }

        document.getElementById('word-input').addEventListener('input', (e) => {
            const val = e.target.value;
            const target = words[currentIdx];
            const el = document.getElementById(`w-${currentIdx}`);

            if(!timerActive && val.trim().length > 0) {
                timerActive = true;
                startTime = Date.now();
                interval = setInterval(() => {
                    document.getElementById('timer').innerText = ((Date.now() - startTime)/1000).toFixed(1) + "s";
                }, 100);
            }

            // Mistake Detection
            if (val.trim() !== target.substring(0, val.trim().length)) {
                el.classList.add('wrong-live'); e.target.classList.add('error');
            } else {
                el.classList.remove('wrong-live'); e.target.classList.remove('error');
            }

            if (val.endsWith(' ')) {
                if (val.trim() === target) {
                    el.classList.remove('current-word', 'wrong-live');
                    el.classList.add('correct');
                    currentIdx++;
                    
                    // Update Progress
                    if (myRole !== 'solo') {
                        const progress = (currentIdx / 40) * 95;
                        const myIdx = participants.indexOf(myID);
                        document.getElementById(`car-${myIdx}`).style.left = progress + "%";
                        
                        const msg = { type: 'update', pIdx: myIdx, pos: progress };
                        if (myRole === 'host') broadcast(msg); else connections[0].send(msg);

                        if (currentIdx >= 40 && !raceFinished) {
                            raceFinished = true;
                            // Sederhana: siapa sampai duluan menang
                            const finishTime = document.getElementById('timer').innerText;
                            if (myRole === 'host') handleFinish(myID, finishTime); 
                            else connections[0].send({ type: 'finish-notif', user: myID, time: finishTime });
                        }
                    }

                    const next = document.getElementById(`w-${currentIdx}`);
                    if(next) {
                        next.classList.add('current-word');
                        if(next.offsetTop > el.offsetTop) {
                            const curY = parseInt(document.getElementById('word-section').style.transform.replace(/[^0-9-]/g, '')) || 0;
                            document.getElementById('word-section').style.transform = `translateY(${curY - 48}px)`;
                        }
                    }
                    e.target.value = '';
                }
            }
        });

        // Host handles the winner logic
        let rankings = [];
        function handleFinish(user, time) {
            rankings.push({ user, time });
            if (rankings.length === participants.length || rankings.length === 1) {
                broadcast({ type: 'end', rankings: rankings });
                showFinal(rankings);
            }
        }

        function showFinal(ranks) {
            clearInterval(interval);
            document.getElementById('overlay').style.display = 'flex';
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = ranks.map((r, i) => `<div>${i+1}. ${r.user} (${r.time})</div>`).join('');
        }

        function changeID() {
            const n = prompt("Ganti ID:");
            if(n) { localStorage.setItem('cybertype_id', n); location.reload(); }
        }

        initGame();
    </script>
</body>
</html>
